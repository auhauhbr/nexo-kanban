name: Validação

on:
  push:
  pull_request:

jobs:
  validar:
    name: Testes, tipos e build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kanban
          POSTGRES_PASSWORD: kanban
          POSTGRES_DB: kanban
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kanban -d kanban"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://kanban:kanban@localhost:5432/kanban?schema=public
      JWT_SECRET: segredo-de-validacao-do-github
      FRONTEND_URL: http://localhost:5173

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Aplicar migrações
        run: npm run db:deploy --workspace backend

      - name: Validar projeto
        run: npm run validar
